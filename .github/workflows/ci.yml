name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  chezmoi-templates:
    name: chezmoi-templates (${{ matrix.os }} dev_env=${{ matrix.dev_env }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        dev_env: [true, false]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install chezmoi
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.local/bin"
          sh -c "$(curl -fsLS get.chezmoi.io)" -- -b "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Configure chezmoi for matrix cell
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.config/chezmoi"
          # TOML literal strings (single-quoted) don't process escapes, so
          # Windows paths like D:\a\dotfiles\dotfiles round-trip safely.
          cat > "$HOME/.config/chezmoi/chezmoi.toml" <<EOF
          sourceDir = '$GITHUB_WORKSPACE'

          [data]
          dev_env = ${{ matrix.dev_env }}
          EOF
          echo "---- chezmoi.toml ----"
          cat "$HOME/.config/chezmoi/chezmoi.toml"

      - name: Render every template
        shell: bash
        run: |
          set -euo pipefail
          fail=0
          render() {
            local f="$1"
            echo "==> rendering $f"
            if ! chezmoi execute-template < "$f" > /dev/null; then
              echo "FAILED to render: $f" >&2
              fail=1
            fi
          }
          # All *.tmpl files in the repo, excluding the git dir.
          while IFS= read -r -d '' f; do
            render "$f"
          done < <(find . -type f -name '*.tmpl' -not -path './.git/*' -print0)
          # .chezmoiignore is always treated as a template even without a .tmpl suffix.
          render ".chezmoiignore"
          exit $fail
